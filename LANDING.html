<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunZone Game Hub</title>

<style>

* {
    box-sizing: border-box;
}

body{
margin:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(45deg,#6a11cb,#2575fc);
color:white;
text-align:center;
transition:0.5s;
min-height:100vh;
}

/* DARK MODE */
.dark{
background:#111;
color:white;
}

/* HEADER */
header{
padding:20px;
font-size:28px;
font-weight:bold;
text-shadow:2px 2px 4px rgba(0,0,0,0.3);
}

/* BUTTONS */
button{
padding:12px 30px;
border:none;
border-radius:25px;
background:#ffcc00;
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin:10px;
transition:0.3s;
box-shadow:0 4px 6px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ffcc00, 0 0 40px rgba(255,204,0,0.5);
}

button:active{
transform:scale(0.95);
}

/* FLOATING IMAGES */
.floating{
position:absolute;
width:80px;
animation: float 5s infinite ease-in-out;
pointer-events:none;
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

.img1{ top:80px; left:40px; }
.img2{ top:150px; right:40px; animation-delay:1s;}
.img3{ bottom:100px; left:45%; animation-delay:2s;}

/* HERO */
.hero{
padding:80px 20px;
position:relative;
z-index:1;
}

.hero h1{
font-size:45px;
animation: bounce 2s infinite;
margin-bottom:10px;
text-shadow:3px 3px 6px rgba(0,0,0,0.4);
}

/* GAME LIST */
#games{
display:none;
padding:30px;
max-width:1200px;
margin:0 auto;
}

.game-container{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.game{
background:white;
color:black;
padding:15px;
width:220px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 16px rgba(0,0,0,0.2);
overflow:hidden;
}

.game img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.game:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 12px 24px rgba(255,255,255,0.3);
}

.game:active{
transform:translateY(-5px) scale(1.02);
}

/* ACTIVE GAME AREA */
#activeGame{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
display:none;
border:2px solid rgba(255,255,255,0.3);
}

.game-controls{
display:flex;
justify-content:center;
gap:20px;
margin:20px 0;
flex-wrap:wrap;
}

.choice-btn{
font-size:40px;
padding:20px;
background:white;
border-radius:50%;
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
border:4px solid transparent;
}

.choice-btn:hover{
transform:scale(1.2) rotate(10deg);
border-color:#ffcc00;
box-shadow:0 0 20px rgba(255,204,0,0.6);
}

.choice-btn.selected{
border-color:#00ff88;
background:#f0fff4;
transform:scale(1.1);
}

/* RESULT */
#result{
margin-top:20px;
font-size:24px;
font-weight:bold;
min-height:30px;
text-shadow:2px 2px 4px rgba(0,0,0,0.5);
}

#gameResult{
font-size:20px;
margin:15px 0;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.2);
min-height:60px;
}

/* SCORE BOARD */
.score-board{
display:flex;
justify-content:center;
gap:40px;
margin:20px 0;
font-size:20px;
font-weight:bold;
}

.score-item{
background:rgba(255,255,255,0.2);
padding:10px 25px;
border-radius:25px;
}

/* ANIMATIONS */
@keyframes float{
0%{transform:translateY(0) rotate(0deg);}
50%{transform:translateY(-20px) rotate(5deg);}
100%{transform:translateY(0) rotate(0deg);}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.05);}
}

.win{
color:#00ff88;
animation:pulse 0.5s ease;
}

.lose{
color:#ff6b6b;
}

.draw{
color:#ffd93d;
}

/* RESPONSIVE */
@media (max-width:768px){
.hero h1{font-size:32px;}
.floating{width:50px;opacity:0.6;}
.img1{left:10px;top:60px;}
.img2{right:10px;top:100px;}
.game{width:160px;}
.choice-btn{width:60px;height:60px;font-size:30px;}
}

</style>

</head>

<body>

<header>
🎮 FunZone Game Hub
</header>

<button onclick="toggleMode()">🌙 Toggle Dark Mode</button>

<!-- FLOATING IMAGES -->
<img src="https://cdn-icons-png.flaticon.com/512/686/686589.png" class="floating img1" alt="Gamepad">
<img src="https://cdn-icons-png.flaticon.com/512/732/732228.png" class="floating img2" alt="Trophy">
<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" class="floating img3" alt="Star">

<!-- HERO -->
<section class="hero">
<h1>Enter the Game World</h1>
<p style="font-size:18px;opacity:0.9;">Play, Explore and Have Fun!</p>
<button onclick="startGame()">🚀 Start Playing</button>
</section>

<!-- GAME LIST -->
<section id="games">
<h2>🎯 Select a Game</h2>

<div class="game-container">
<div class="game" onclick="loadGame('rps')">
<img src="https://images.unsplash.com/photo-1614036634955-ae5e90f9b9eb?w=400&h=300&fit=crop" alt="RPS">
<p>✊ Rock Paper Scissors</p>
</div>

<div class="game" onclick="showComingSoon('Memory Game')">
<img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d?w=400&h=300&fit=crop" alt="Memory">
<p>🧠 Memory Match</p>
</div>

<div class="game" onclick="showComingSoon('Quiz Game')">
<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400&h=300&fit=crop" alt="Quiz">
<p>❓ Trivia Quiz</p>
</div>
</div>

<!-- ACTIVE GAME AREA -->
<div id="activeGame">
<h3 id="gameTitle">Rock Paper Scissors</h3>
<p>Choose your weapon!</p>
<div class="game-controls">
<div class="choice-btn" onclick="playRPS('rock')" title="Rock">✊</div>
<div class="choice-btn" onclick="playRPS('paper')" title="Paper">✋</div>
<div class="choice-btn" onclick="playRPS('scissors')" title="Scissors">✌️</div>
</div>
<div id="gameResult">Make your choice...</div>
<div class="score-board">
<div class="score-item">You: <span id="playerScore">0</span></div>
<div class="score-item">Computer: <span id="computerScore">0</span></div>
</div>
<button onclick="resetGame()" style="background:#ff6b6b;color:white;">Reset Game</button>
</div>

<div id="result"></div>
</section>

<audio id="clickSound" preload="auto">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
let score = 0;
let playerScore = 0;
let computerScore = 0;
let currentGame = '';

function playSound(){
const sound = document.getElementById("clickSound");
sound.volume = 0.3;
sound.play().catch(e => console.log("Audio play failed:", e));
}

function startGame(){
playSound();
document.getElementById("games").style.display="block";
document.getElementById("games").scrollIntoView({behavior: 'smooth'});
}

function loadGame(game){
playSound();
currentGame = game;
document.getElementById("activeGame").style.display="block";
document.getElementById("result").innerHTML="Playing: <strong>Rock Paper Scissors</strong>";
document.getElementById("activeGame").scrollIntoView({behavior: 'smooth'});
}

function showComingSoon(name){
playSound();
document.getElementById("result").innerHTML=`🚧 <strong>${name}</strong> coming soon! Try Rock Paper Scissors instead.`;
document.getElementById("activeGame").style.display="none";
}

function playRPS(playerChoice){
playSound();
const choices = ['rock','paper','scissors'];
const computerChoice = choices[Math.floor(Math.random()*3)];
const emojis = {rock:'✊',paper:'✋',scissors:'✌️'};
const beats = {rock:'scissors',paper:'rock',scissors:'paper'};

// Visual feedback
document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
event.target.classList.add('selected');

let resultText = `You chose ${emojis[playerChoice]} vs Computer chose ${emojis[computerChoice]}<br>`;
let resultClass = '';

if(playerChoice === computerChoice){
resultText += "<span class='draw'>🤝 It's a Draw!</span>";
} else if(beats[playerChoice] === computerChoice){
resultText += "<span class='win'>🎉 You Win!</span>";
playerScore++;
score += 10;
} else {
resultText += "<span class='lose'>😢 You Lose!</span>";
computerScore++;
}

document.getElementById("gameResult").innerHTML = resultText;
document.getElementById("playerScore").textContent = playerScore;
document.getElementById("computerScore").textContent = computerScore;
document.getElementById("result").innerHTML = `Score: <strong>${score}</strong> points earned!`;
}

function resetGame(){
playSound();
playerScore = 0;
computerScore = 0;
document.getElementById("playerScore").textContent = '0';
document.getElementById("computerScore").textContent = '0';
document.getElementById("gameResult").innerHTML = "Make your choice...";
document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
}

function toggleMode(){
playSound();
document.body.classList.toggle("dark");
const isDark = document.body.classList.contains("dark");
event.target.innerHTML = isDark ? "☀️ Toggle Light Mode" : "🌙 Toggle Dark Mode";
}
</script>

</body>
</html>
